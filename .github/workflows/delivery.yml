name: Production delivery

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment to prepare
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment || 'production' }}
    env:
      NODE_ENV: test
      MONGO_URI: mongodb://127.0.0.1:27017/build_validation
      ADS_API_URL: https://example.invalid/api/v1/common/advertiser/names
      ADS_API_TOKEN: build-placeholder
      ADS_API_MODE: mock
      APOLLO_API_KEY: build-placeholder
      APOLLO_MODE: mock
      GEMINI_MODE: mock
      MAIL_MODE: mock

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Verify and build
        run: |
          npm run build --workspace shared
          npm run typecheck
          npm test
          npm run build

      - name: Package native Node.js release
        run: tar -czf power-leads-release.tgz client/dist client/package.json server/dist server/package.json shared/dist shared/package.json package.json package-lock.json

      - name: Smoke-test release contents
        run: |
          mkdir release-smoke
          tar -xzf power-leads-release.tgz -C release-smoke
          test -f release-smoke/client/dist/index.html
          test -f release-smoke/server/dist/index.js
          test -f release-smoke/shared/dist/index.js
          test -f release-smoke/package-lock.json

      - name: Upload delivery artifact
        uses: actions/upload-artifact@v4
        with:
          name: power-leads-${{ inputs.environment || 'production' }}-${{ github.sha }}
          if-no-files-found: error
          retention-days: 30
          path: power-leads-release.tgz

      # Add the hosting-provider deployment command here after P0 selects the target.
